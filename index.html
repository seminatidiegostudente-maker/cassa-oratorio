<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cassa CRE Oratorio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <div class="left-panel">
    <div class="header-main">
      <h1>🍽️ CASSA CRE</h1>
      <div class="live-clock">
        <span id="dataLive"></span> — <span id="orarioLive"></span>
      </div>
    </div>

    <div id="items" class="items-grid"></div>

    <div class="bottom-bar">
      <div class="totale-parziale">
        Piatti totali: <span id="total">0</span> | <span class="price-highlight">€<span id="totalPrice">0.00</span></span>
      </div>
      <div class="action-buttons">
        <button id="reset" class="btn-secondary">Svuota Carrello</button>
        <button id="adminBtn" style="background: #4b5563; color: white; font-weight: bold; border-radius: 10px; padding: 0 15px; cursor: pointer; border: none; height: 48px; font-size: 16px;">⚙️ Magazzino</button>
        <button id="confirm" class="btn-primary">Conferma e Stampa 🧾</button>
      </div>
    </div>

    <div id="adminPanel" style="display:none; margin-top: 20px; padding: 15px; background: #f1f5f9; border: 2px solid #cbd5e1; border-radius: 12px; max-height: 300px; overflow-y: auto;">
      <h3 style="margin-bottom: 10px; font-size: 16px; color: #1e293b;">⚙️ Pannello Gestione Scorte (Live Firebase)</h3>
      <div id="adminItemsList"></div>
      <button id="closeAdminBtn" style="background: #ef4444; color: white; height: 35px; font-size: 14px; margin-top: 15px; border: none; border-radius: 6px; padding: 0 15px; cursor: pointer; font-weight: bold;">Chiudi Gestione</button>
    </div>
  </div>

  <div class="right-panel">
    <h2>🧾 RIEPILOGO ORDINE</h2>
    <div id="summary" class="summary-box"></div>

    <div class="grand-total-section">
      <span>TOTALE DA PAGARE</span>
      <div id="grandTotal">€0.00</div>
    </div>

    <div class="form-group-row">
      <div class="form-group">
        <label for="famigliaInput">👨‍👩‍👧 Famiglia / Nome</label>
        <input type="text" id="famigliaInput" placeholder="Es. Rossi">
      </div>
      <div class="form-group short">
        <label for="tavoloInput">🪑 Tavolo</label>
        <input type="number" id="tavoloInput" placeholder="Num">
      </div>
      <div class="form-group short">
        <label for="personeInput">👥 Persone</label>
        <input type="number" id="personeInput" placeholder="Num">
      </div>
    </div>

    <div class="payment-section">
      <label>💳 Metodo di Pagamento</label>
      <div class="payButtons">
        <button id="cashBtn" class="pay-btn">💵 Contanti</button>
        <button id="posBtn" class="pay-btn">💳 POS</button>
      </div>
    </div>

    <div id="cashArea" class="cash-calculator">
      <div class="form-group">
        <label for="cashGiven">Importo Ricevuto (€)</label>
        <input type="number" id="cashGiven" step="0.01" placeholder="Quanto ti dà il cliente?">
      </div>
      
      <div class="quick-cash-buttons">
        <button type="button" class="btn-quick" data-amount="5">5€</button>
        <button type="button" class="btn-quick" data-amount="10">10€</button>
        <button type="button" class="btn-quick" data-amount="20">20€</button>
        <button type="button" class="btn-quick" data-amount="50">50€</button>
      </div>

      <div class="restoBox">
        <span>Resto da dare:</span>
        <span class="resto-value">€<span id="resto">0.00</span></span>
      </div>
    </div>
  </div>

</div>

<div id="ingredientsModal" class="modal-overlay">
  <div class="modal-content">
    <h3 id="modalTitle">Personalizza Hamburger</h3>
    <div class="ingredients-list">
      <label class="check-container">
        <input type="checkbox" id="ing-insalata" checked> Insalata
      </label>
      <label class="check-container">
        <input type="checkbox" id="ing-formaggio" checked> Formaggio
      </label>
      <label class="check-container">
        <input type="checkbox" id="ing-pomodori" checked> Pomodori
      </label>
      <label class="check-container">
        <input type="checkbox" id="ing-maionese" checked> Maionese
      </label>
      <label class="check-container">
        <input type="checkbox" id="ing-ketchup" checked> Ketchup
      </label>
    </div>
    <div class="modal-actions">
      <button id="cancelIngredients" class="btn-modal-cancel">Annulla</button>
      <button id="saveIngredients" class="btn-modal-save">Conferma</button>
    </div>
  </div>
</div>

<div id="vinoModal" class="modal-overlay">
  <div class="modal-content">
    <h3 id="vinoModalTitle">Seleziona Tipo Vino</h3>
    <div class="vino-options-list">
      <button class="btn-vino-opt bianco" onclick="selezionaTipoVino('Bianco')">🥂 Bianco</button>
      <button class="btn-vino-opt rosso" onclick="selezionaTipoVino('Rosso')">🍷 Rosso</button>
    </div>
    <div class="modal-actions" style="margin-top: 15px;">
      <button id="cancelVino" class="btn-modal-cancel">Annulla</button>
    </div>
  </div>
</div>

<div id="gnocchiModal" class="modal-overlay">
  <div class="modal-content">
    <h3 style="color: #111827;">Condimento Gnocchi</h3>
    <div class="vino-options-list">
      <button class="btn-vino-opt" style="background: #fef08a; color: #854d0e;" onclick="selezionaCondimentoGnocchi('Burro')">🧈 Burro</button>
      <button class="btn-vino-opt" style="background: #fca5a5; color: #991b1b;" onclick="selezionaCondimentoGnocchi('Pomodoro')">🍅 Pomodoro</button>
      <button class="btn-vino-opt" style="background: #bfdbfe; color: #1e3a8a;" onclick="selezionaCondimentoGnocchi('Zola')">🧀 Zola</button>
      <button class="btn-vino-opt" style="background: #bbf7d0; color: #166534;" onclick="selezionaCondimentoGnocchi('Pesto')">🌿 Pesto</button>
    </div>
    <div class="modal-actions" style="margin-top: 15px;">
      <button id="cancelGnocchi" class="btn-modal-cancel">Annulla</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="script.js"></script>

</body>
</html>
